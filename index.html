<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lords Deck Lab</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"> 
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">⚡ Lords Deck Lab</div>
    <nav class="nav">
      <button class="nav-btn active" data-section="search">Card Search</button>
      <button class="nav-btn" data-section="builder">Deck Builder</button>
      <button class="nav-btn" data-section="simulator">Hand Simulator</button>
      <button class="nav-btn" data-section="damage">Damage Calc</button>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main">

<!-- SECTION 1: Card Search -->
<section id="search" class="section active">
  <h2>Card Search</h2>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search a card... e.g. Dragapult">
    <select id="formatFilter">
      <option value="">All Sets</option>
      <option value="standard" selected>Standard Only</option>
    </select>
    <button id="searchBtn">Search</button>
  </div>

  <!-- ✅ This DIV missing -->
  <div id="cardGrid" class="card-grid"></div>

</section>
<!-- SECTION 2: Deck Builder -->
<section id="builder" class="section">
  <h2>Deck Builder</h2>

  <!-- IMPORT DECK -->
  <div class="import-area">
    <div class="import-header">
      <span class="import-title">📋 Import Deck from TCG Live</span>
      <span class="import-hint">Paste your exported decklist below</span>
    </div>
    <textarea 
      id="deckImport" 
      placeholder="Paste your deck here...&#10;&#10;Example:&#10;4 Dragapult ex TWM 130&#10;2 Drakloak TWM 129&#10;4 Professor's Research SVI 189&#10;8 Fire Energy SVE 2"
      rows="6"
    ></textarea>
    <div class="import-actions">
      <button id="importBtn">⚡ Import Deck</button>
      <button id="clearDeckBtn">🗑 Clear Deck</button>
    </div>
  </div>

  <div class="deck-stats">
    <span>Total cards: <strong id="cardCount">0</strong>/60</span>
    <span>Pokémon: <strong id="pokemonCount">0</strong></span>
    <span>Trainers: <strong id="trainerCount">0</strong></span>
    <span>Energy: <strong id="energyCount">0</strong></span>
  </div>
  <div id="deckList" class="deck-list"></div>
</section>

    <!-- SECTION 3: Hand Simulator -->
    <section id="simulator" class="section">
      <h2>Hand Simulator</h2>
      <button id="drawBtn">Draw Opening Hand (7 cards)</button>
      <div id="handDisplay" class="hand-display"></div>
    </section>

<!-- SECTION 4: Damage Calculator -->
<section id="damage" class="section">
  <h2>Damage Calculator</h2>

  <div class="damage-form">

    <div class="form-group">
      <label>Base Damage</label>
      <input type="number" id="baseDmg" value="120" min="0" max="999">
    </div>

    <div class="form-group">
      <label>Weakness</label>
      <select id="weakness">
        <option value="1">None</option>
        <option value="2" selected>×2 (Standard)</option>
        <option value="1.5">×1.5 (Old format)</option>
        <option value="30">+30 (Vintage)</option>
      </select>
    </div>

    <div class="form-group">
      <label>Resistance</label>
      <select id="resistance">
        <option value="0">None</option>
        <option value="30">-30</option>
        <option value="20">-20</option>
      </select>
    </div>

    <div class="form-group">
      <label>Coin Flip Bonus</label>
      <input type="number" id="coinBonus" value="0" min="0" max="999">
    </div>

    <div class="form-group">
      <label>Tool / Stadium Bonus</label>
      <input type="number" id="extraDmg" value="0" min="0" max="999">
    </div>

    <div class="form-group">
      <label>Opponent's HP</label>
      <input type="number" id="opponentHp" value="200" min="0" max="999">
    </div>

    <button class="calc-btn" id="calcBtn">⚡ Calculate Damage</button>

  </div>

  <div class="damage-result" id="damageResult">
    <div class="damage-number" id="damageNumber">0</div>
    <div class="damage-label">Total Damage</div>
    <div id="knockoutMsg" style="margin-top:12px;font-size:16px;font-weight:700;"></div>
    <div id="damageTags" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px;"></div>
  </div>

</section>
  </main>

  <script src="app.js"></script>
</body>
</html>
